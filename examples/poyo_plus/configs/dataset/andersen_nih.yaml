# Center-out reaching
- selection:
  - brainset: andersen_nih
    sessions:
    - n1_20190412_CenterStart
    - n1_20190517_CenterStart
    - n1_20190528_CenterStart
    - n2_20240516_CenterStart
    - n2_20240530_CenterStart
    - n2_20240816_CenterStart
    - n2_20240820_CenterStart
    - n2_20241015_CenterStart
    - n2_20241022_CenterStart
  config:
    multitask_readout:
      - readout_id: cursor_direction_to_target_2d
        normalize_mean: 0.
        normalize_std: 20.
        weights:
          movement_phases.hold_period: 0.1
          movement_phases.reach_period: 5.0
        metrics:
          - metric:
              _target_: torchmetrics.R2Score
              num_outputs: 2
        eval_interval: movement_phases.reach_period